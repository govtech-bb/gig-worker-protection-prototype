<style>
  :root {
    --color-yellow-00:#e8a833; --color-yellow-100:#ffc726; --color-yellow-40:#ffe9a8; --color-yellow-10:#fff9e9;
    --color-blue-00:#00164a; --color-blue-100:#00267f; --color-blue-40:#99a8cc; --color-blue-10:#e5e9f2;
    --color-black-00:#000; --color-mid-grey-00:#595959; --color-grey-00:#e0e4e9; --color-white-00:#fff;
    --color-green-00:#00654a; --color-green-100:#1fbf84; --color-green-40:#a5e5ce; --color-green-10:#e9f9f3;
    --color-red-00:#a42c2c; --color-red-100:#ff6b6b; --color-red-40:#ffc4c4; --color-red-10:#fff0f0;
    --color-teal-00:#0e5f64; --color-teal-100:#30c0c8; --color-teal-40:#ace6e9; --color-teal-10:#eaf9f9;
    --color-purple-00:#4a235a; --color-purple-100:#a962c7;
    --color-pink-00:#ad1157; --color-pink-100:#ff94d9;

    /* alpha.gov.bb design tokens */
    --spacing-xs: 0.5rem;  --spacing-s: 1rem;  --spacing-xm: 1.5rem;
    --spacing-m: 2rem;     --spacing-l: 4rem;  --spacing-xl: 8rem;
    --radius-sm: 0.25rem;  --radius-md: 0.375rem;  --radius-lg: 0.5rem;
    --shadow-form-hover: inset 4px 4px 0px 0px #0000001a;
  }
  html, body { font-family: Figtree, -apple-system, system-ui, sans-serif; }
  body {
    font-weight: 400; line-height: 1.55;
    display: grid; min-height: 100vh; grid-template-rows: auto auto auto 1fr auto;
    background: var(--color-white-00); color: var(--color-black-00);
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 1200px; margin-inline: auto; padding-inline: 16px; }
  .stage { max-width: 600px; margin-inline: auto; }
  .stage-wide { max-width: 760px; margin-inline: auto; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* Range sliders */
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 10px;
    background: #e5e9f2; border-radius: 999px; outline: none;
    background-image: linear-gradient(#0e5f64, #0e5f64);
    background-size: 0% 100%; background-repeat: no-repeat;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 32px; height: 32px;
    border-radius: 50%; background: #0e5f64; cursor: pointer;
    border: 5px solid #fff; box-shadow: 0 2px 8px rgba(0,22,74,0.25);
  }
  input[type=range]::-moz-range-thumb {
    width: 32px; height: 32px; border-radius: 50%; background: #0e5f64; cursor: pointer;
    border: 5px solid #fff; box-shadow: 0 2px 8px rgba(0,22,74,0.25);
  }
  input[type=range]:focus-visible { box-shadow: 0 0 0 4px #30c0c8; }

  /* Screen transitions */
  .screen { animation: fade 0.32s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Selectable cards */
  .selectable { transition: all .18s ease; }
  .selectable[aria-checked="true"],
  .selectable.selected {
    border-color: #0e5f64; background: #eaf9f9;
    box-shadow: 0 0 0 2px #0e5f64 inset;
  }

  /* Buttons */
  .btn-primary {
    background: #0e5f64; color: #fff;
    transition: background-color .15s, box-shadow .15s, transform .05s;
  }
  .btn-primary:hover { background: #1a777d; box-shadow: inset 0 0 0 4px rgba(222,245,246,0.10); }
  .btn-primary:active { background: #0a4549; transform: translateY(1px); }
  .btn-primary:focus-visible { outline: none; box-shadow: 0 0 0 4px #30c0c8; }
  .btn-primary:disabled { background: #99a8cc; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    background: #fff; color: #0e5f64; border: 2px solid #0e5f64;
    transition: background-color .15s, color .15s;
  }
  .btn-secondary:hover { background: #eaf9f9; }
  .btn-secondary:focus-visible { outline: none; box-shadow: 0 0 0 4px #30c0c8; }

  /* Links */
  .link-bb {
    color: #0e5f64; text-decoration: underline; text-underline-offset: 2px;
  }
  .link-bb:hover { color: #000; background: #eaf9f9; text-decoration: none; }
  .link-bb:focus-visible { outline: none; background: #ffc726; color: #000; text-decoration: none; }

  /* Expandable cards */
  details.scenario summary { list-style: none; cursor: pointer; }
  details.scenario summary::-webkit-details-marker { display: none; }
  details.scenario[open] .chev { transform: rotate(180deg); }
  .chev { transition: transform .2s ease; }

  /* Soft pattern dot background for hero */
  .hero-bg {
    background-image:
      radial-gradient(circle at 20% 20%, rgba(48,192,200,0.18), transparent 40%),
      radial-gradient(circle at 80% 0%, rgba(255,199,38,0.22), transparent 40%);
  }

  /* Steppers */
  .stepper-btn {
    width: 44px; height: 44px; border-radius: 999px;
    border: 2px solid var(--color-teal-00); color: var(--color-teal-00);
    background: #fff; font-size: 1.25rem; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .stepper-btn:hover { background: var(--color-teal-10); }
  .stepper-btn:disabled { border-color: var(--color-grey-00); color: var(--color-grey-00); cursor: not-allowed; background: #fff; }
  .stepper-btn:focus-visible { outline: none; box-shadow: 0 0 0 4px var(--color-teal-100); }

  /* Tag/chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 0.85rem; font-weight: 600;
  }

  /* Bar visualization (for protection level) */
  .protect-bar {
    height: 14px; border-radius: 999px; background: var(--color-grey-00);
    overflow: hidden; position: relative;
  }
  .protect-bar-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #1fbf84, #30c0c8);
    transition: width .5s cubic-bezier(.22,1,.36,1);
  }
</style>

/* ─────────────────────────────────────────────────────────
   Helpers
   ───────────────────────────────────────────────────────── */
const fmtMoney = n => 'BDS$' + Math.round(n).toLocaleString('en-BB');

function progressBar(currentId) {
  const idx = JOURNEY.indexOf(currentId);
  if (idx === -1) return '';
  const total = JOURNEY.length;
  return `
    <div class="mb-6" aria-label="Progress">
      <div class="flex items-center justify-between mb-2 text-[0.85rem] text-bb-mid-grey-00">
        <span class="font-medium text-bb-blue-00">Step ${idx + 1} of ${total}</span>
        <span>${Math.round(((idx + 1) / total) * 100)}% through the guide</span>
      </div>
      <div class="flex gap-1.5" role="progressbar" aria-valuenow="${idx + 1}" aria-valuemin="1" aria-valuemax="${total}">
        ${JOURNEY.map((_, i) => `
          <div class="h-1.5 flex-1 rounded-full ${i <= idx ? 'bg-bb-teal-00' : 'bg-bb-grey-00'}"></div>
        `).join('')}
      </div>
    </div>`;
}

function backBtn(target) {
  return `
    <button type="button" onclick="nav('${target}')"
      class="link-bb inline-flex items-center gap-1.5 mb-4 px-2 py-2 -ml-2 rounded-sm text-[1rem]">
      ${ICONS.arrowLeft}<span>Back</span>
    </button>`;
}

// alpha.gov.bb form section caption — left-bordered service label that sits above the H1.
function serviceCaption(text = 'NISSS for self-employed and gig workers') {
  return `
    <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 text-[1rem] mb-4">
      ${text}
    </p>`;
}

// Primary action — alpha.gov.bb button styling (rounded-sm, 20px on desktop,
// 18px on mobile so long labels don't wrap awkwardly on narrow screens,
// inset hover/active shadows). Width: full-column.
function primaryBtn(label, action, opts = {}) {
  const disabled = opts.disabled ? 'disabled' : '';
  return `
    <button type="button" onclick="${action}" ${disabled}
      class="btn-primary w-full inline-flex items-center justify-center gap-2 px-xm py-s rounded-sm text-[1.125rem] sm:text-[1.25rem] font-semibold leading-[1.5] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
      ${label} ${opts.arrow !== false ? ICONS.arrowRight : ''}
    </button>`;
}

function secondaryBtn(label, action) {
  return `
    <button type="button" onclick="${action}"
      class="btn-secondary w-full inline-flex items-center justify-center px-xm py-s rounded-sm text-[1rem] sm:text-[1.125rem] font-semibold leading-[1.5] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
      ${label}
    </button>`;
}

        <div class="flex justify-between mt-2 text-[0.8rem] text-bb-mid-grey-00 tabular-nums">

            <input id="slowMonth-typed" type="number" inputmode="numeric" min="0" max="20000" step="50"

            const selected = d.hasDependants === o.id;
            return `
              <button type="button" role="radio" aria-checked="${selected}"
                onclick="setDependants('${o.id}')"
                class="selectable rounded-lg border-2 border-bb-grey-00 bg-white py-3 px-2 text-[1rem] font-medium text-bb-blue-00 hover:border-bb-teal-00 hover:bg-bb-teal-10/40 focus:outline-none focus-visible:ring-4 focus-visible:ring-bb-teal-100 ${selected ? 'selected' : ''}">
                ${o.label}
              </button>`;
          }).join('')}
        </div>
        ${d.hasDependants === 'yes' ? `
          <label for="depCount" class="block text-[0.95rem] text-bb-mid-grey-00 mb-1">How many people depend on you?</label>
          <div class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="max-width: 220px;">
            <input id="depCount" type="number" inputmode="numeric" min="1" max="20" step="1"
              value="${d.dependantsCount || 1}"
              oninput="updateDependantsCount(this.value)"

      ${primaryBtn('Continue', "nav('risk-awareness')")}

}

/* ─────────────────────────────────────────────────────────
   SCREEN 4 — Risk awareness (now runs AFTER income, so the
   figures below reflect what the user actually earns)
   ───────────────────────────────────────────────────────── */
function screenRiskAwareness() {
  const d = state.data;
  const monthsLost = (d.goodMonth + d.slowMonth) / 2;
  const twoWeeksLost = Math.round(monthsLost / 2);
  const yearLost = Math.round(((d.goodMonth * (12 - d.slowMonthsPerYear)) + (d.slowMonth * d.slowMonthsPerYear)));

  return `
    <div class="screen stage">
      ${backBtn('income-reality')}

      <div class="space-y-3 mb-6">
        ${[
          {
            id: 'sick', icon: 'sickness', title: 'You get sick for two weeks.',
            without: `That's about <strong>${fmtMoney(twoWeeksLost)}</strong> you couldn't earn — rent, food, bills still due.`,
            withNis: 'NISSS sickness benefit pays part of your usual earnings while you recover, so you can rest without panic.',
          },

            id: 'injury', icon: 'invalidity', title: 'You get hurt and cannot work for months.',
            without: 'No safety net. Savings go fast. Family steps in or things get hard.',

            id: 'baby', icon: 'maternity', title: "You're starting a family.",
            without: 'Time off means no money — many parents go back to work too soon.',
            withNis: 'NISSS maternity and paternity benefits pay you to take real time off with your baby.',
          },
          {
            id: 'retire', icon: 'pension', title: "You're 65 and ready to slow down.",
            without: `Without a pension, that's <strong>${fmtMoney(yearLost)}/year</strong> you'd need from somewhere else.`,
            withNis: 'NISSS pays a monthly pension for life, built up from years of small contributions.',
          },
          {
            id: 'family', icon: 'survivors', title: "Something happens to you.",
            without: 'Your partner, kids, or parents lose the income you brought in.',
            withNis: 'Survivors benefit and a funeral grant help your family keep going.',
          },
        ].map(s => `
          <details class="scenario rounded-xl border border-bb-grey-00 bg-white overflow-hidden" ${state.expandedScenario === s.id ? 'open' : ''} onclick="toggleScenario('${s.id}', event)">
            <summary class="p-4 flex items-start gap-3 hover:bg-bb-blue-10/30">

                <span class="block font-semibold text-[1.05rem] text-bb-blue-00">${s.title}</span>

              </span>
              <span class="shrink-0 text-bb-mid-grey-00 mt-2">${ICONS.chevDown}</span>

            <div class="px-4 pb-5 pt-1 space-y-3 border-t border-bb-grey-00">
              <div class="rounded-lg bg-bb-red-10 border border-bb-red-40/60 p-3">
                <p class="text-[0.85rem] uppercase tracking-wide text-bb-red-00 font-semibold mb-1">Without NISSS</p>
                <p class="text-[0.98rem] text-bb-blue-00">${s.without}</p>
              </div>
              <div class="rounded-lg bg-bb-green-10 border border-bb-green-40 p-3">

}

/* ─────────────────────────────────────────────────────────
   SCREEN 3 — Plan (combines contribution choice + protection levels +
                    benefit estimates + future-self framing into ONE page)

   When no tier is selected:  user sees the 3 tier cards.
   When a tier IS selected:   the gradient "your plan" hero, benefit
                              estimates, and protection bars appear
                              inline below — no extra clicks.
   ───────────────────────────────────────────────────────── */
function screenPlan() {
  const d = state.data;

  // Annual income — uses defaults if user jumped here directly
  const goodMonths = 12 - d.slowMonthsPerYear;
  const annualIncome = (d.goodMonth * goodMonths) + (d.slowMonth * d.slowMonthsPerYear);
  const monthlyAvg = annualIncome / 12;

  // Tier amounts
  const minMonthly    = 100;
  const saferMonthly  = Math.max(150, Math.round(monthlyAvg * 0.10 / 10) * 10);
  const strongMonthly = Math.max(225, Math.round(monthlyAvg * 0.15 / 10) * 10);

  const tier = d.contributionTier; // null | 'minimum' | 'safer' | 'strong'
  const chosen =
    tier === 'minimum' ? minMonthly :
    tier === 'safer'   ? saferMonthly :
    tier === 'strong'  ? strongMonthly : null;

  // Relative protection level — drives the bar fill in the hero.
  // This is a QUALITATIVE indicator only (more contributions = more cover).
  // Exact benefit figures are not shown until NISSS confirms them.
  const protectionPct =
    tier === 'minimum' ? 40 :
    tier === 'safer'   ? 70 :
    tier === 'strong'  ? 95 : 0;
  const protectionLabel =
    tier === 'minimum' ? 'Basic cover' :
    tier === 'safer'   ? 'Better cover' :
    tier === 'strong'  ? 'Strongest cover' : '';

  // Placeholder for any payout figure — real amounts must come from NISSS.
  const TBC = '<span class="text-bb-mid-grey-00 italic">(amount to be confirmed with NISSS)</span>';

  // Tier card definitions
  const tiers = [
    {
      id: 'minimum', label: 'Minimum', monthly: minMonthly, tag: 'Basic', color: 'yellow',
      sub: "Meets the BDS$1,200/year threshold. Smaller payments when you claim — but you're covered for everything.",
    },
    {
      id: 'safer', label: 'Moderate', monthly: saferMonthly, tag: 'Recommended', color: 'green',
      sub: 'A bigger share of your earnings, so you build more contributions and stronger cover.',
    },
    {
      id: 'strong', label: 'Stronger', monthly: strongMonthly, tag: 'Maximum', color: 'teal',
      sub: 'The most you put in here — closer to what employees contribute, building the strongest cover.',
    },
  ];

  // Benefit descriptions — plain-language only. No payout figures are shown
  // until NISSS confirms the calculation; each carries a "to be confirmed" note.
  const benefitsInline = [
    { id: 'sickness',   icon: 'sickness',   title: 'Sickness benefit',
      desc: tier ? `If you can't work because you're sick, NISSS pays part of your usual earnings while you recover ${TBC}.` : '' },
    { id: 'maternity',  icon: 'maternity',  title: 'Maternity benefit',
      desc: tier ? `Paid time off when you have a baby, based on your earnings ${TBC}.` : '' },
    { id: 'paternity',  icon: 'paternity',  title: 'Paternity benefit',
      desc: tier ? `A short paid break for new fathers to be with their family ${TBC}.` : '' },
    { id: 'invalidity', icon: 'invalidity', title: 'Invalidity benefit',
      desc: tier ? `Ongoing income if a long illness stops you working ${TBC}.` : '' },
    { id: 'survivors',  icon: 'survivors',  title: 'Survivors benefit',
      desc: tier ? `Monthly payments for your partner, children, or parents if anything happens to you ${TBC}.` : '' },
    { id: 'pension',    icon: 'pension',    title: 'Old age pension',
      desc: tier ? `A monthly pension for life once you reach pension age, built from your years of contributions ${TBC}.` : '' },
  ];

  return `
    <div class="screen stage">
      ${backBtn('risk-awareness')}
      ${progressBar('plan')}
      ${serviceCaption()}

      <h1 class="font-bold text-[1.85rem] sm:text-[2.25rem] leading-[1.15] text-bb-blue-00 mb-2">
        What should you put in?
      </h1>
      <p class="text-[1.05rem] text-bb-mid-grey-00 mb-6">
        Pick a level. You'll see what it gets you below — no extra clicks.
      </p>

      <!-- Earnings summary -->
      <div class="rounded-2xl border border-bb-blue-10 bg-bb-blue-10/40 p-4 mb-5">
        <p class="text-[0.9rem] text-bb-mid-grey-00 mb-1">Based on what you told us</p>
        <p class="text-[1.05rem] text-bb-blue-00">
          Average earnings: <strong class="tabular-nums">${fmtMoney(monthlyAvg)}</strong>
          <span class="text-bb-mid-grey-00">/ month</span>
        </p>
      </div>

      <!-- Tier cards -->
      <div class="space-y-3 mb-6" role="radiogroup" aria-label="Contribution tier">
        ${tiers.map(t => {
          const selected = tier === t.id;
          const c = COLOR_MAP[t.color];
          return `
            <button type="button" role="radio" aria-checked="${selected}"
              onclick="selectTier('${t.id}')"
              class="selectable text-left rounded-xl border-2 ${selected ? '' : c.border + ' ' + c.bg} bg-white p-4 w-full focus:outline-none focus-visible:ring-4 focus-visible:ring-bb-teal-100 ${selected ? 'selected' : ''}">
              <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <p class="font-semibold text-[1.05rem] text-bb-blue-00">${t.label}</p>
                    <span class="chip bg-white ${c.text} border ${c.border}">${t.tag}</span>
                  </div>
                  <div class="mt-1 flex items-baseline gap-2">
                    <span class="text-[1.5rem] font-bold ${c.text} tabular-nums">${fmtMoney(t.monthly)}</span>
                    <span class="text-bb-mid-grey-00 text-[0.95rem]">/ month</span>
                  </div>
                  <p class="text-[0.92rem] text-bb-mid-grey-00 mt-2">${t.sub}</p>
                </div>
                <span class="shrink-0 w-6 h-6 mt-1 rounded-full inline-flex items-center justify-center ${selected ? 'bg-bb-teal-00 text-white' : 'border-2 border-bb-grey-00 text-transparent'}">${ICONS.check}</span>
              </div>
            </button>
          `;
        }).join('')}
      </div>

      ${tier ? `
        <!-- Plan hero (the future-self moment — colour change on tier select) -->
        <div id="plan-hero" class="rounded-3xl bg-gradient-to-br from-bb-teal-00 to-bb-blue-100 text-white p-6 mb-5 shadow-card-hover">
          <p class="text-[0.85rem] uppercase tracking-wide text-bb-teal-40 font-semibold mb-1">Your plan</p>
          <p class="text-[2rem] font-bold leading-tight tabular-nums mb-1">${fmtMoney(chosen)}<span class="text-[1rem] font-normal text-bb-teal-40"> / month</span></p>
          <p class="text-[0.95rem] text-white/90">About <strong class="tabular-nums">${fmtMoney(chosen / 4)}</strong> a week.</p>

          <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-white/20">
            <div>
              <p class="text-[0.8rem] uppercase tracking-wide text-bb-teal-40">In a year</p>
              <p class="text-[1.3rem] font-bold tabular-nums">${fmtMoney(chosen * 12)}</p>
            </div>
            <div>
              <p class="text-[0.8rem] uppercase tracking-wide text-bb-teal-40">In 10 years</p>
              <p class="text-[1.3rem] font-bold tabular-nums">${fmtMoney(chosen * 12 * 10)}</p>
            </div>
          </div>

          <div class="mt-5">
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-[0.9rem] text-white/90">Your protection level</span>
              <span class="text-[0.9rem] font-semibold text-white">${protectionLabel}</span>
            </div>
            <div class="protect-bar bg-white/20">
              <div class="protect-bar-fill" style="width: ${protectionPct}%"></div>
            </div>
            <p class="text-[0.8rem] text-white/70 mt-2">
              The more you put in, the more cover you build. Exact benefit amounts to be confirmed with NISSS.
            </p>
          </div>
        </div>

        <!-- Inline benefit estimates (no click-to-expand) -->
        <h2 class="font-bold text-[1.4rem] text-bb-blue-00 mb-2">What this gets you</h2>
        <p class="text-[1rem] text-bb-mid-grey-00 mb-4">
          Six things, all included — sized to the level you picked.
        </p>

        <div class="space-y-3 mb-5">
          ${benefitsInline.map(b => {
            const def = BENEFITS.find(x => x.id === b.id);
            const c = def ? COLOR_MAP[def.color] : COLOR_MAP.teal;
            return `
              <div class="rounded-2xl border ${c.border} ${c.bg} p-4">
                <div class="flex items-start gap-3">
                  <span class="shrink-0 inline-flex items-center justify-center w-11 h-11 rounded-full bg-white ${c.text}">${ICONS[b.icon]}</span>
                  <div class="flex-1 min-w-0">
                    <p class="font-semibold text-[1.05rem] text-bb-blue-00 mb-1">${b.title}</p>
                    <p class="text-[0.95rem] text-bb-blue-00/80 leading-snug">${b.desc}</p>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
          <div class="rounded-2xl border border-bb-teal-40 bg-bb-teal-10 p-4">
            <div class="flex items-start gap-3">
              <span class="shrink-0 inline-flex items-center justify-center w-11 h-11 rounded-full bg-white text-bb-teal-00">${ICONS.shield}</span>
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-[1.05rem] text-bb-blue-00 mb-1">Funeral grant</p>
                <p class="text-[0.95rem] text-bb-blue-00/80">A one-time payment to help your family with funeral costs. Included at every level.</p>
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-2xl bg-bb-yellow-10 border border-bb-yellow-40 p-4 mb-4 flex items-start gap-3">
          <span class="text-bb-yellow-00 shrink-0 mt-0.5">${ICONS.spark}</span>
          <p class="text-[0.95rem] text-bb-blue-00">
            <strong>Slow month?</strong> Pay less or skip — no penalty. <strong>Good month?</strong> Top up. What counts is the total over the year.
          </p>
        </div>

        <div class="rounded-2xl bg-bb-blue-10 border border-bb-blue-40 p-4 mb-6 flex items-start gap-3">
          <span class="text-bb-blue-100 shrink-0 mt-0.5">${ICONS.clock}</span>
          <p class="text-[0.95rem] text-bb-blue-00">
            <strong>When your cover starts:</strong> you're protected after one full year of contributions — at least BDS$1,200 over the year. Keep paying and your cover stays active.
          </p>
        </div>
      ` : `
        <div class="rounded-2xl bg-bb-grey-00/40 border border-bb-grey-00 p-5 mb-6 text-center">
          <p class="text-[0.95rem] text-bb-mid-grey-00">↑ Pick a level to see what it gets you.</p>
        </div>
      `}

      ${primaryBtn("I'm ready — show me next steps", "nav('next-steps')", { disabled: !tier })}
      <p class="text-center text-[0.85rem] text-bb-mid-grey-00 mt-3">
        Contribution amounts are examples to help you plan. Exact benefit amounts and rates to be confirmed with NISSS.
      </p>
    </div>`;
}

        <div class="rounded-xl border border-bb-grey-00 bg-white p-3 text-center">
          <p class="text-[1.4rem] font-bold text-bb-blue-00 tabular-nums leading-tight">${monthsActive}</p>
          <p class="text-[0.8rem] text-bb-mid-grey-00 mt-1 leading-snug">Months active</p>
        </div>
      </div>

      <!-- Recent activity -->
      <h2 class="font-bold text-[1.25rem] text-bb-blue-00 mb-3">Recent activity</h2>
      <div class="rounded-2xl border border-bb-grey-00 bg-white divide-y divide-bb-grey-00 mb-3">
        ${history.map(h => {
          const statusStyle = {
            paid:   { bg: 'bg-bb-green-10',  fg: 'text-bb-green-00',  label: 'Paid',     icon: 'circleCheck' },
            due:    { bg: 'bg-bb-yellow-10', fg: 'text-bb-yellow-00', label: 'Due soon', icon: 'bell'        },
            missed: { bg: 'bg-bb-grey-00',   fg: 'text-bb-mid-grey-00', label: 'Skipped', icon: 'circleMinus'},
          }[h.status];
          return `
            <div class="flex items-center gap-3 p-4">
              <span class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-full ${statusStyle.bg} ${statusStyle.fg}">
                ${ICONS[statusStyle.icon]}
              </span>
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-[1rem] text-bb-blue-00">${h.month}</p>
                <p class="text-[0.88rem] text-bb-mid-grey-00 mt-0.5">${h.date}</p>
              </div>
              <div class="text-right shrink-0">
                <p class="font-bold text-[1.05rem] text-bb-blue-00 tabular-nums">${h.amount ? fmtMoney(h.amount) : '—'}</p>
                <p class="text-[0.82rem] ${statusStyle.fg} font-medium">${statusStyle.label}</p>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <button type="button" onclick="alert('In a real service, this would show your full payment history and let you download a statement.')"
        class="link-bb inline-flex items-center gap-1.5 text-[1rem] font-medium mb-6">
        ${ICONS.download}<span>Download full statement</span>
      </button>

      <!-- Back-pay nudge -->
      <div class="rounded-2xl bg-bb-blue-10/60 border border-bb-blue-10 p-4 mb-6 flex items-start gap-3">
        <span class="text-bb-blue-00 shrink-0 mt-0.5">${ICONS.spark}</span>
        <div>
          <p class="font-semibold text-bb-blue-00 mb-1">You skipped August 2026</p>
          <p class="text-[0.95rem] text-bb-blue-00/80 mb-2">No worries — slow months happen. You can back-pay it any time in the next 3 years and it'll count toward your benefits. After a year, a 5% surcharge is added, so sooner is cheaper.</p>
          <button type="button" onclick="alert('In a real service, this would let you back-pay BDS$150 for August 2026.')"
            class="link-bb text-[0.95rem] font-medium">Back-pay BDS$150 →</button>
        </div>
      </div>

      <!-- Eligibility progress -->
      <h2 class="font-bold text-[1.25rem] text-bb-blue-00 mb-3">What you qualify for</h2>
      <p class="text-[0.95rem] text-bb-mid-grey-00 mb-4">
        Each benefit needs a minimum number of contributions. Here's where you stand.
      </p>
      <div class="space-y-3 mb-6">
        ${eligibility.map(b => {
          const pct = Math.min(100, Math.round((b.have / b.need) * 100));
          const isEligible = b.have >= b.need;
          return `
            <div class="rounded-xl border border-bb-grey-00 bg-white p-4">
              <div class="flex items-center justify-between gap-3 mb-2">
                <p class="font-semibold text-[1rem] text-bb-blue-00">${b.title}</p>
                <span class="chip ${isEligible ? 'bg-bb-green-10 text-bb-green-00 border border-bb-green-40' : 'bg-bb-yellow-10 text-bb-yellow-00 border border-bb-yellow-40'}">
                  ${isEligible ? ICONS.circleCheck : ICONS.calendar}
                  <span>${isEligible ? 'Eligible' : 'In progress'}</span>
                </span>
              </div>
              <div class="flex items-center justify-between mb-1.5 text-[0.85rem] text-bb-mid-grey-00 tabular-nums">
                <span>${b.have} / ${b.need} ${b.unit}</span>
                <span>${pct}%</span>
              </div>
              <div class="protect-bar">
                <div class="protect-bar-fill" style="width: ${pct}%"></div>
              </div>
              <p class="text-[0.88rem] text-bb-mid-grey-00 mt-2">${b.note}</p>
            </div>
          `;
        }).join('')}
      </div>

      <!-- Secondary actions -->
      <h2 class="font-bold text-[1.25rem] text-bb-blue-00 mb-3">Manage your account</h2>
      <div class="space-y-2 mb-6">
        ${[
          { icon: 'card',     title: 'Change my contribution amount',  sub: 'Adjust your monthly target',        action: "nav('plan')" },
          { icon: 'phone',    title: 'Update my contact details',      sub: 'Phone, email, address',             action: "alert('In a real service, this would open the account settings.')" },
          { icon: 'building', title: 'Talk to an NISSS officer',         sub: 'Get help with your account',        action: "nav('register')" },
        ].map(a => `
          <button type="button" onclick="${a.action}"
            class="text-left rounded-xl border border-bb-grey-00 bg-white p-4 w-full flex items-center gap-3 hover:border-bb-teal-00 hover:bg-bb-teal-10/40 focus:outline-none focus-visible:ring-4 focus-visible:ring-bb-teal-100 transition-colors">
            <span class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-full bg-bb-blue-10 text-bb-blue-00">${ICONS[a.icon]}</span>
            <span class="flex-1 min-w-0">
              <span class="block font-semibold text-[1rem] text-bb-blue-00">${a.title}</span>
              <span class="block text-[0.88rem] text-bb-mid-grey-00 mt-0.5">${a.sub}</span>
            </span>
            <span class="text-bb-teal-00">${ICONS.arrowRight}</span>
          </button>
        `).join('')}
      </div>

      <p class="text-[0.85rem] text-bb-mid-grey-00 text-center">
        This is a prototype. Numbers shown here are for demonstration only.
      </p>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   SCREEN 13 — Confirmation
   ───────────────────────────────────────────────────────── */
function screenConfirmation() {
  const ref = window.__refNumber || ('GWP-' + Math.random().toString(36).substring(2, 8).toUpperCase());
  const d = state.data;
  const safeName = d.firstName ? d.firstName.split(' ')[0].replace(/[<>]/g, '') : '';

  return `
    <div class="screen stage">
      <div class="bg-gradient-to-br from-bb-teal-00 to-bb-blue-100 text-white p-6 sm:p-7 rounded-2xl mb-6 shadow-card-hover">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/15 mb-4">
          ${ICONS.check}
        </div>
        <h1 class="font-bold text-[1.85rem] sm:text-[2.25rem] leading-[1.15] mb-2">
          Thanks${safeName ? ', ' + safeName : ''}.
        </h1>
        <p class="text-[1.05rem] text-white/90 mb-5">
          We got your details. Someone from NISSS will reach out within 5 working days.
        </p>
        <div class="bg-white/10 rounded-lg p-3">
          <p class="text-[0.85rem] uppercase tracking-wide text-bb-teal-40 font-semibold">Your reference</p>
          <p class="text-[1.5rem] font-bold tabular-nums">${ref}</p>
        </div>
      </div>

      <h2 class="font-bold text-[1.25rem] text-bb-blue-00 mb-3">What happens next</h2>
      <ol class="space-y-3 mb-6">
        ${[
          'We send a quick message to confirm we have your details.',
          'An NISSS officer reaches out by your preferred method to answer questions.',
          'When you are ready, they help you complete registration — there is no rush.',
        ].map((step, i) => `
          <li class="flex items-start gap-3">
            <span class="shrink-0 inline-flex items-center justify-center w-8 h-8 rounded-full bg-bb-blue-10 text-bb-blue-00 font-bold tabular-nums">${i + 1}</span>
            <span class="text-[1.05rem] text-bb-blue-00 pt-1">${step}</span>
          </li>
        `).join('')}
      </ol>

      <div class="rounded-xl border border-bb-grey-00 bg-white p-4 mb-6">
        <p class="text-[0.95rem] text-bb-mid-grey-00">
          You can step away any time. Joining is voluntary, and you choose how much to contribute based on what you actually earn.
        </p>
      </div>

      <div class="space-y-3">
        ${primaryBtn('See my contribution dashboard', "nav('tracker')")}
        ${secondaryBtn('Return to the start', "restart()")}
        <button type="button" onclick="nav('benefits-quick')"
          class="block text-center w-full text-bb-teal-00 underline underline-offset-2 py-3 text-[1rem] hover:no-underline">
          Learn more about NISSS benefits
        </button>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   Rendering + navigation
   ───────────────────────────────────────────────────────── */
const SCREENS = {
  'landing': screenLanding,
  'risk-awareness': screenRiskAwareness,
  'worker-type': screenWorkerType,
  'income-reality': screenIncomeReality,
  'plan': screenPlan,
  'next-steps': screenNextSteps,
  'benefits-quick': screenBenefitsQuick,
  'register-path': screenRegisterPath,
  'registration-guide': screenRegistrationGuide,
  'payment-options': screenPaymentOptions,
  'register': screenRegister,
  'tracker': screenTracker,
  'confirmation': screenConfirmation,
};

const TITLES = {
  'landing': 'Protect your income – NISSS Barbados',
  'risk-awareness': 'What if something happened? – NISSS Barbados',
  'worker-type': 'What kind of work do you do? – NISSS Barbados',
  'income-reality': "Let's talk about your earnings – NISSS Barbados",
  'plan': 'Your contribution plan – NISSS Barbados',
  'next-steps': 'Next steps – NISSS Barbados',
  'benefits-quick': 'Six ways NISSS protects you – NISSS Barbados',
  'register-path': 'Do you have an NISSS number? – NISSS Barbados',
  'registration-guide': 'How to register – NISSS Barbados',
  'payment-options': 'How to pay – NISSS Barbados',
  'register': 'Tell us where to reach you – NISSS Barbados',
  'tracker': 'Your NISSS contributions – NISSS Barbados',
  'confirmation': 'Thanks – NISSS Barbados',
};

function render(opts = {}) {
  const root = document.getElementById('app');
  root.innerHTML = (SCREENS[state.screen] || screenLanding)();
  document.title = (Object.keys(state.errors).length ? 'Error: ' : '') + (TITLES[state.screen] || TITLES.landing);
  // Scroll to top ONLY when navigating between screens, not on in-page re-renders
  // (selecting cards, picking radio options, etc.)
  if (opts.scroll) {
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }
  if (Object.keys(state.errors).length && document.getElementById('error-summary')) {
    document.getElementById('error-summary').focus();
  }
}

function nav(screen) {
  state.screen = screen;
  state.errors = {};
  state.expandedScenario = null;
  render({ scroll: true });
}

function selectWorker(id) {
  state.data.workerType = id;
  render();
}
function nextFromWorkerType() {
  if (!state.data.workerType) return;
  nav('income-reality');
}

function updateIncomeField(field, v, source) {
  const num = Math.max(0, Math.min(20000, parseInt(v, 10) || 0));
  state.data[field] = num;

  // Update the big read-only display value
  const display = document.getElementById(field + '-display');
  if (display) display.textContent = fmtMoney(num);

  // Update slider (unless the slider itself was the source — leaves the thumb where the user dragged it)
  const slider = document.getElementById(field);
  if (slider) {
    if (source !== 'slider') slider.value = Math.min(6000, num);
    slider.style.backgroundSize = Math.min(100, (num / 6000) * 100) + '% 100%';
  }

  // Update typed input (unless the input itself was the source — avoids cursor jumping while typing)
  if (source !== 'typed') {
    const typed = document.getElementById(field + '-typed');
    if (typed) typed.value = num;
  }
}

function setDependants(id) {
  state.data.hasDependants = id;
  if (id === 'yes' && !state.data.dependantsCount) state.data.dependantsCount = 1;
  if (id === 'no') state.data.dependantsCount = 0;
  render();
}

function updateDependantsCount(v) {
  const num = Math.max(0, Math.min(20, parseInt(v, 10) || 0));
  state.data.dependantsCount = num;
}

function toggleScenario(id, ev) {
  // Let the native details/summary handle open state; we just track which is open for re-render fidelity
  // Defer state update so the click-on-summary toggling completes naturally
  setTimeout(() => {
    const el = ev.currentTarget;
    if (!el) return;
    state.expandedScenario = el.open ? id : null;
  }, 0);
}

function selectTier(id) {
  state.data.contributionTier = id;
  render();
}

function setHasNis(id) {
  state.data.alreadyHasNis = id;
  render();
}

function goToRegistrationGuide() {
  if (!state.data.alreadyHasNis) return;
  nav('registration-guide');
}

function submitForm(ev) {
  ev.preventDefault();
  const e = {};
  if (!state.data.firstName.trim()) e.firstName = 'Tell us your first name';
  if (!state.data.contact.trim()) e.contact = 'Add a phone number or email';
  else if (state.data.contact.includes('@')) {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.data.contact.trim()))
      e.contact = 'Check that email looks right (for example, you@example.com)';
  } else {
    if (state.data.contact.replace(/\D/g, '').length < 7)
      e.contact = 'Add a phone number we can reach you on';
  }
  if (!state.data.contactMethod) e.contactMethod = 'Choose how we should reach you';

  state.errors = e;
  if (Object.keys(e).length) {
    render();
    return;
  }
  window.__refNumber = 'GWP-' + Math.random().toString(36).substring(2, 7).toUpperCase();
  nav('confirmation');
}

function restart() {
  state.data = {
    workerType: null,
    goodMonth: 2500,
    slowMonth: 800,
    slowMonthsPerYear: 3,
    hasDependants: null,
    dependantsCount: 0,
    contributionTier: null,
    monthlyContribution: 150,
    alreadyHasNis: null,
    firstName: '',
    contact: '',
    contactMethod: null,
  };
  state.errors = {};
  state.expandedScenario = null;
  window.__refNumber = null;
  nav('landing');
}

// Initial render — first render scrolls to top for screen-reader users landing on the page
render({ scroll: true });
</script>
</body>
</html>
