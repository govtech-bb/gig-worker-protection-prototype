<style>
  :root {
    --color-yellow-00:#e8a833; --color-yellow-100:#ffc726; --color-yellow-40:#ffe9a8; --color-yellow-10:#fff9e9;
    --color-blue-00:#00164a; --color-blue-100:#00267f; --color-blue-40:#99a8cc; --color-blue-10:#e5e9f2;
    --color-black-00:#000; --color-mid-grey-00:#595959; --color-grey-00:#e0e4e9; --color-white-00:#fff;
    --color-green-00:#00654a; --color-green-100:#1fbf84; --color-green-40:#a5e5ce; --color-green-10:#e9f9f3;
    --color-red-00:#a42c2c; --color-red-100:#ff6b6b; --color-red-40:#ffc4c4; --color-red-10:#fff0f0;
    --color-teal-00:#0e5f64; --color-teal-100:#30c0c8; --color-teal-40:#ace6e9; --color-teal-10:#eaf9f9;
  }
  html, body { font-family: Figtree, -apple-system, system-ui, sans-serif; }
  body {
    font-weight: 400; line-height: 1.55;
    display: grid; min-height: 100vh; grid-template-rows: auto auto auto 1fr auto;
    background: var(--color-white-00); color: var(--color-black-00);
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 1200px; margin-inline: auto; padding-inline: 16px; }
  .stage { max-width: 560px; margin-inline: auto; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 10px;
    background: #e5e9f2; border-radius: 999px; outline: none;
    background-image: linear-gradient(#0e5f64, #0e5f64);
    background-size: 0% 100%; background-repeat: no-repeat;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 32px; height: 32px;
    border-radius: 50%; background: #0e5f64; cursor: pointer;
    border: 5px solid #fff; box-shadow: 0 2px 8px rgba(0,22,74,0.25);
  }
  input[type=range]::-moz-range-thumb {
    width: 32px; height: 32px; border-radius: 50%; background: #0e5f64; cursor: pointer;
    border: 5px solid #fff; box-shadow: 0 2px 8px rgba(0,22,74,0.25);
  }
  input[type=range]:focus-visible { box-shadow: 0 0 0 4px #30c0c8; }

  .screen { animation: fade 0.28s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .selectable[aria-checked="true"],
  .selectable.selected {
    border-color: #0e5f64; background: #eaf9f9;
    box-shadow: 0 0 0 2px #0e5f64 inset;
  }

  .btn-primary {
    background: #0e5f64; color: #fff;
    transition: background-color .15s, box-shadow .15s, transform .05s;
  }
  .btn-primary:hover { background: #1a777d; box-shadow: inset 0 0 0 4px rgba(222,245,246,0.10); }
  .btn-primary:active { background: #0a4549; transform: translateY(1px); }
  .btn-primary:focus-visible { outline: none; box-shadow: 0 0 0 4px #30c0c8; }
  .btn-primary:disabled { background: #99a8cc; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    background: #fff; color: #0e5f64; border: 2px solid #0e5f64;
    transition: background-color .15s, color .15s;
  }
  .btn-secondary:hover { background: #eaf9f9; }
  .btn-secondary:focus-visible { outline: none; box-shadow: 0 0 0 4px #30c0c8; }

  .link-bb {
    color: #0e5f64; text-decoration: underline; text-underline-offset: 2px;
  }
  .link-bb:hover { color: #000; background: #eaf9f9; text-decoration: none; }
  .link-bb:focus-visible { outline: none; background: #ffc726; color: #000; text-decoration: none; }
</style>

function progressBar(currentId) {
  const idx = FLOW_STEPS.indexOf(currentId);

  const total = FLOW_STEPS.length;
  return `
    <div class="mb-6" aria-label="Progress">
      <div class="flex items-center justify-between mb-2 text-[0.85rem] text-bb-mid-grey-00">

      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   Rendering + navigation
   ───────────────────────────────────────────────────────── */

const SCREENS = {
  'landing': screenLanding,
  'worker-type': screenWorkerType,
  'benefits': screenBenefits,
  'estimator': screenEstimator,
  'register': screenRegister,
  'confirmation': screenConfirmation,
};

function render() {
  const root = document.getElementById('app');
  root.innerHTML = (SCREENS[state.screen] || screenLanding)();
  // Update page title for screen-reader users
  const titles = {
    'landing': 'Protect your income – Gig Worker Social Protection',
    'worker-type': 'How do you earn? – Gig Worker Social Protection',
    'benefits': 'How NIS protects you – Gig Worker Social Protection',
    'estimator': 'Estimate your contribution – Gig Worker Social Protection',
    'register': 'Tell us where to reach you – Gig Worker Social Protection',
    'confirmation': 'Thanks – Gig Worker Social Protection',
  };
  document.title = (Object.keys(state.errors).length ? 'Error: ' : '') + (titles[state.screen] || titles.landing);
  // Move focus to top of main content for screen-reader users on screen change
  window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  if (Object.keys(state.errors).length && document.getElementById('error-summary')) {
    document.getElementById('error-summary').focus();
  }
}

function nav(screen) {
  state.screen = screen;
  state.errors = {};
  render();
}

function selectWorker(id) {
  state.data.workerType = id;
  render();
}
function nextFromWorkerType() {
  if (!state.data.workerType) return;
  nav('benefits');
}

function selectVariability(id) {
  state.data.incomeVariability = id;
  render();
}

function updateEarnings(v) {
  const num = Math.max(0, Math.min(20000, parseInt(v, 10) || 0));
  state.data.monthlyEarnings = num;
  render();
}

function submitForm(ev) {
  ev.preventDefault();
  const e = {};
  if (!state.data.firstName.trim()) e.firstName = 'Tell us your first name';
  if (!state.data.contact.trim()) e.contact = 'Add a phone number or email';
  else if (state.data.contact.includes('@')) {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.data.contact.trim()))
      e.contact = 'Check that email looks right (for example, you@example.com)';
  } else {
    if (state.data.contact.replace(/\D/g, '').length < 7)
      e.contact = 'Add a phone number we can reach you on';
  }
  if (!state.data.contactMethod) e.contactMethod = 'Choose how we should reach you';

  state.errors = e;
  if (Object.keys(e).length) {
    render();
    return;
  }
  // Simulate submission and ref number
  window.__refNumber = 'GWP-' + Math.random().toString(36).substring(2, 7).toUpperCase();
  nav('confirmation');
}

function restart() {
  state.data = {
    workerType: null, monthlyEarnings: 1500, incomeVariability: null,
    firstName: '', contact: '', contactMethod: null, alreadyRegistered: null,
  };
  window.__refNumber = null;
  nav('landing');
}

// Initial render
render();
</script>
